stages:
  - kaos

variables:
  KAOS_RELEASE_REPO: "kavinsood/kaos"

default:
  image: node:20

update_kaos:
  stage: kaos
  rules:
    - when: manual
  script:
    - node scripts/update-from-release.mjs
    - |
      if git diff --quiet; then
        echo "No KAOS server changes to commit."
        exit 0
      fi
    - VERSION="$(node -p "require('./package.json').version")"
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab"
    - git add -A
    - git commit -m "kaos(server): update to ${VERSION}"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git push origin "HEAD:${CI_COMMIT_BRANCH:-$CI_DEFAULT_BRANCH}"

revert_kaos:
  stage: kaos
  rules:
    - when: manual
  script:
    - node scripts/revert-last-update.mjs
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git push origin "HEAD:${CI_COMMIT_BRANCH:-$CI_DEFAULT_BRANCH}"
